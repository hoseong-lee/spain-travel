<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#2d1200"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8725A"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="50%" stop-color="#E8725A"/>
      <stop offset="100%" stop-color="#C8102E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Spain flag stripe hint -->
  <rect x="0" y="165" width="512" height="182" fill="#C8102E" opacity=".1"/>
  <rect x="0" y="208" width="512" height="96" fill="#F5A623" opacity=".12"/>
  <!-- Azulejo tile pattern -->
  <g opacity=".05" fill="#fff">
    <rect x="40" y="40" width="28" height="28" rx="6"/>
    <rect x="80" y="40" width="28" height="28" rx="6"/>
    <rect x="404" y="40" width="28" height="28" rx="6"/>
    <rect x="444" y="40" width="28" height="28" rx="6"/>
    <rect x="40" y="444" width="28" height="28" rx="6"/>
    <rect x="80" y="444" width="28" height="28" rx="6"/>
    <rect x="404" y="444" width="28" height="28" rx="6"/>
    <rect x="444" y="444" width="28" height="28" rx="6"/>
    <!-- mid decorations -->
    <rect x="40" y="80" width="28" height="28" rx="6"/>
    <rect x="444" y="80" width="28" height="28" rx="6"/>
    <rect x="40" y="404" width="28" height="28" rx="6"/>
    <rect x="444" y="404" width="28" height="28" rx="6"/>
  </g>
  <!-- Compass/sun ring -->
  <circle cx="256" cy="226" r="96" fill="none" stroke="url(#sun)" stroke-width="4" opacity=".35"/>
  <circle cx="256" cy="226" r="80" fill="none" stroke="url(#sun)" stroke-width="1.5" opacity=".15" stroke-dasharray="8 12"/>
  <!-- Sun rays -->
  <g opacity=".12" stroke="#F5A623" stroke-width="2">
    <line x1="256" y1="116" x2="256" y2="100"/>
    <line x1="256" y1="336" x2="256" y2="352"/>
    <line x1="146" y1="226" x2="130" y2="226"/>
    <line x1="366" y1="226" x2="382" y2="226"/>
    <line x1="186" y1="156" x2="175" y2="145"/>
    <line x1="326" y1="296" x2="337" y2="307"/>
    <line x1="326" y1="156" x2="337" y2="145"/>
    <line x1="186" y1="296" x2="175" y2="307"/>
  </g>
  <!-- Airplane -->
  <g transform="translate(256,220) rotate(-30) scale(2.6)">
    <path d="M-6,20 L0,-24 L6,20 L0,14Z" fill="url(#sun)" opacity=".9"/>
    <path d="M-22,8 L0,0 L22,8 L0,4Z" fill="url(#sun)" opacity=".9"/>
    <path d="M-8,22 L0,18 L8,22 L0,20Z" fill="#F5A623" opacity=".7"/>
  </g>
  <!-- ESPAÑA text -->
  <text x="256" y="395" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="52" fill="url(#warm)" opacity=".85" letter-spacing="6">ESPAÑA</text>
  <!-- Subtitle -->
  <text x="256" y="428" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="16" fill="#94a3b8" opacity=".5" letter-spacing="8">HONEYMOON</text>
  <!-- Corner dot accents -->
  <circle cx="110" cy="395" r="4" fill="#E8725A" opacity=".4"/>
  <circle cx="402" cy="395" r="4" fill="#E8725A" opacity=".4"/>
</svg>
