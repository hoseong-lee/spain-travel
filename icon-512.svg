<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <clipPath id="rounded"><rect width="512" height="512" rx="108"/></clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- Spanish flag stripes -->
    <rect x="0" y="0" width="512" height="128" fill="#C60B1E" opacity=".85"/>
    <rect x="0" y="128" width="512" height="256" fill="#FFC400" opacity=".85"/>
    <rect x="0" y="384" width="512" height="128" fill="#C60B1E" opacity=".85"/>
    <!-- Subtle texture overlay -->
    <rect width="512" height="512" fill="#000" opacity=".25"/>
    <!-- Shield shape (coat of arms hint) -->
    <path d="M256,155 L310,185 L310,270 C310,310 256,345 256,345 C256,345 202,310 202,270 L202,185 Z" fill="none" stroke="#FFC400" stroke-width="3.5" opacity=".7"/>
    <path d="M256,165 L302,192 L302,265 C302,300 256,332 256,332 C256,332 210,300 210,265 L210,192 Z" fill="#C60B1E" opacity=".3"/>
    <!-- Airplane inside shield -->
    <g transform="translate(256,245) rotate(-25) scale(1.8)">
      <path d="M-6,20 L0,-24 L6,20 L0,14Z" fill="#FFC400" opacity=".95"/>
      <path d="M-22,8 L0,0 L22,8 L0,4Z" fill="#FFC400" opacity=".95"/>
      <path d="M-8,22 L0,18 L8,22 L0,20Z" fill="#FFD700" opacity=".8"/>
    </g>
    <!-- ESPAÑA text -->
    <text x="256" y="420" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="56" fill="#FFC400" opacity=".9" letter-spacing="8">ESPAÑA</text>
    <!-- Decorative line under text -->
    <line x1="140" y1="438" x2="372" y2="438" stroke="#FFC400" stroke-width="1.5" opacity=".35"/>
    <!-- Small crown hint above shield -->
    <g transform="translate(256,140)" opacity=".6">
      <rect x="-18" y="-8" width="36" height="12" rx="2" fill="#FFC400"/>
      <rect x="-14" y="-14" width="4" height="8" rx="1" fill="#FFC400"/>
      <rect x="-2" y="-16" width="4" height="10" rx="1" fill="#FFC400"/>
      <rect x="10" y="-14" width="4" height="8" rx="1" fill="#FFC400"/>
    </g>
  </g>
</svg>
