<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#2d1200"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8725A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- Spain flag stripe hint -->
  <rect x="0" y="62" width="192" height="68" rx="0" fill="#C8102E" opacity=".12"/>
  <rect x="0" y="78" width="192" height="36" rx="0" fill="#F5A623" opacity=".15"/>
  <!-- Decorative tile pattern (azulejo hint) -->
  <g opacity=".06" fill="#fff">
    <rect x="16" y="16" width="20" height="20" rx="4"/>
    <rect x="44" y="16" width="20" height="20" rx="4"/>
    <rect x="128" y="16" width="20" height="20" rx="4"/>
    <rect x="156" y="16" width="20" height="20" rx="4"/>
    <rect x="16" y="156" width="20" height="20" rx="4"/>
    <rect x="44" y="156" width="20" height="20" rx="4"/>
    <rect x="128" y="156" width="20" height="20" rx="4"/>
    <rect x="156" y="156" width="20" height="20" rx="4"/>
  </g>
  <!-- Sun/compass circle -->
  <circle cx="96" cy="88" r="36" fill="none" stroke="url(#sun)" stroke-width="2.5" opacity=".4"/>
  <!-- Airplane -->
  <g transform="translate(96,86) rotate(-30)">
    <path d="M-6,20 L0,-24 L6,20 L0,14Z" fill="url(#sun)" opacity=".9"/>
    <path d="M-22,8 L0,0 L22,8 L0,4Z" fill="url(#sun)" opacity=".9"/>
    <path d="M-8,22 L0,18 L8,22 L0,20Z" fill="#F5A623" opacity=".7"/>
  </g>
  <!-- ES text -->
  <text x="96" y="148" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="22" fill="#F5A623" opacity=".8">ESPAÑA</text>
  <!-- Small dot accents -->
  <circle cx="42" cy="148" r="2" fill="#E8725A" opacity=".5"/>
  <circle cx="150" cy="148" r="2" fill="#E8725A" opacity=".5"/>
</svg>
