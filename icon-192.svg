<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <clipPath id="rounded"><rect width="192" height="192" rx="40"/></clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="192" height="192" fill="url(#bg)"/>
    <!-- Spanish flag stripes -->
    <rect x="0" y="0" width="192" height="48" fill="#C60B1E" opacity=".85"/>
    <rect x="0" y="48" width="192" height="96" fill="#FFC400" opacity=".85"/>
    <rect x="0" y="144" width="192" height="48" fill="#C60B1E" opacity=".85"/>
    <!-- Texture overlay -->
    <rect width="192" height="192" fill="#000" opacity=".25"/>
    <!-- Shield -->
    <path d="M96,52 L120,66 L120,100 C120,116 96,130 96,130 C96,130 72,116 72,100 L72,66 Z" fill="none" stroke="#FFC400" stroke-width="2" opacity=".7"/>
    <path d="M96,57 L116,69 L116,98 C116,112 96,124 96,124 C96,124 76,112 76,98 L76,69 Z" fill="#C60B1E" opacity=".3"/>
    <!-- Airplane -->
    <g transform="translate(96,90) rotate(-25) scale(.75)">
      <path d="M-6,20 L0,-24 L6,20 L0,14Z" fill="#FFC400" opacity=".95"/>
      <path d="M-22,8 L0,0 L22,8 L0,4Z" fill="#FFC400" opacity=".95"/>
      <path d="M-8,22 L0,18 L8,22 L0,20Z" fill="#FFD700" opacity=".8"/>
    </g>
    <!-- Crown -->
    <g transform="translate(96,46)" opacity=".6">
      <rect x="-8" y="-4" width="16" height="6" rx="1" fill="#FFC400"/>
      <rect x="-6" y="-7" width="2" height="4" rx=".5" fill="#FFC400"/>
      <rect x="-1" y="-8" width="2" height="5" rx=".5" fill="#FFC400"/>
      <rect x="4" y="-7" width="2" height="4" rx=".5" fill="#FFC400"/>
    </g>
    <!-- ESPAÑA text -->
    <text x="96" y="160" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="20" fill="#FFC400" opacity=".9" letter-spacing="3">ESPAÑA</text>
  </g>
</svg>
